services:
  # PostgreSQL Database for Auto-Ledger
  db:
    image: postgres:15-alpine
    container_name: auto-ledger-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: auto_ledger_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis for OTP and Real-time caching
  redis:
    image: redis:alpine
    container_name: auto-ledger-redis
    restart: always
    ports:
      - "6379:6379"

  # NestJS Backend API
  backend:
    build:
      context: ./backend/nest-api
      dockerfile: Dockerfile
    container_name: auto-ledger-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/auto_ledger_db?schema=public
      - JWT_SECRET=AutoLedgerSecretKey2026
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
